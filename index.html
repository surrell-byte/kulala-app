      body: `Maji was eleven seasons old when she first heard the baobab speak.

It was the hour when the savanna turns gold and the hornbills fly home, and Maji had stayed too long at the riverbank watching the hippos yawn. Now she was running — red dust kicking up around her ankles, the great baobab looming ahead like a sleeping giant.

She was about to sprint past it when a sound stopped her. Not wind. Not insects. A low, gentle creak, like old wood settling after a long day.

"Little one," the sound seemed to say. "Why do you always run?"

Maji froze. She looked left. She looked right. She looked up into the baobab's wide, cloud-reaching branches. Nothing. Just leaves catching the last of the sun.

She told herself it was her imagination and ran home for supper.

But the next evening, she came back. This time she sat at the base of the tree, back against the cool bark, and she waited. The sky deepened from orange to purple. Fireflies appeared one by one.

"You came back," the tree said — and this time, Maji did not run.

"Did you speak to me yesterday?" she asked, very quietly, the way you speak when you are not sure if something is real.

"I have been speaking to you for years," the baobab replied. "You were always too busy running to hear me."

Maji thought about this. It was true. She ran to the river in the morning, ran home at noon, ran errands for her grandmother in the afternoon. She ran to school, she ran from school. She was always moving.

"What have you been trying to tell me?" she asked.

"That the ground beneath your feet has a story," the tree said. "That the old tortoise by the dry riverbed knows where the next rains will come. That your grandmother's hands, when they are shelling groundnuts, are writing a kind of poem. That the world whispers all the time — but only to those who are still."

Maji sat with that for a long moment.

And one morning, three days before the rains came, Maji told her village: "Look to the acacias. Water is coming."

      body: `The River Nyota shimmered like hammered silver on the morning Maji decided she was tired of waiting.

She was waiting for the mango tree to ripen. She was waiting for her little brother Tatu to be old enough to play the games she loved. She was waiting for the dry season to end, for school to begin again, for the weaver birds to finish the enormous nest they had started in the fever tree.

"I am tired of waiting for everything," she announced to the river.

The river, as rivers do, simply kept moving.

Maji crossed her arms. "Did you hear me?"

A kingfisher landed on a stone nearby, looked at her sideways with one bright eye, and flew off downstream.

"Even the birds do not listen," she muttered.

But then she noticed something. Just upstream, where the river narrowed between two large rocks, a tiny silver fish was swimming hard against the current, going nowhere — moving its tail furiously, barely holding its position. It was not making progress. But it was not being swept away either.

"Why doesn't it just go with the water?" Maji wondered aloud.

Her grandmother had followed her down to the river, as grandmothers often do when they sense their grandchildren need company. She settled herself on a flat rock with a sigh of deep comfort.

"Because it is waiting," her grandmother said simply.

"Waiting for what?"

"For the insect that will fall off that overhanging branch. It has seen it happen before. It knows if it holds its place, breakfast will come to it."

They watched together. A minute passed. Two. The fish held its position, tail beating silently against the current.

And then — plop — a green beetle tumbled from the branch into the water. The fish had it before the ripples finished spreading.

Maji was quiet for a long time.

"The mango tree is waiting too, isn't it?" she said at last.

"For exactly the right number of sunny days," her grandmother agreed.

"And Tatu?"

"Growing quietly, like all rivers in the dry season — not stopping, just collecting his depth."

That afternoon, Maji went to the mango tree and sat beneath it. She was still waiting. But now the waiting felt different — it felt like the fish in the current, purposeful and knowing, holding a place for something that was surely coming.

The mangoes turned gold three weeks later.

      body: `One night, the jungle trembled with a distant roar, and Maji could not sleep.

It was the kind of roar that rearranged everything — the insects fell silent, the goats shifted nervously in their enclosure, and even the stars seemed to dim. A lion, the elders said the next morning. A young male, newly arrived, announcing his territory.

That morning, Maji's grandmother needed herbs from the far side of the forest — the herbs that grew only in the clearing near the wide fig tree, the clearing that lay in the direction of the roar.

Maji picked up the woven basket.

Her heart hammered the whole walk there.

She told herself this was foolish. She told herself to turn back four separate times. Her feet, sensibly ignoring her, kept walking.

At the base of the fig tree, half-buried in roots, she found something unexpected: a drum. Small, old, its skin stretched tight over dark wood, a pattern of running antelopes carved around its body.

She knelt and picked it up. Without really thinking about why, she tapped it once.

The sound that came out was astonishing — deep and warm and rolling, like a voice saying: here. I am here.

She tapped it again, and again. The drumbeat filled the clearing, steady and unhurried. Something in Maji settled. Her breathing slowed. The shadows stopped looking like predators.

She gathered the herbs.

On the walk home, she kept drumming — slowly, steadily, a heartbeat pace. The forest did not change. But she did.

Her grandmother received the herbs and the drum with equal reverence.

"Whose drum is it?" Maji asked.

"Yours now," her grandmother said. "It found you."

"What does it do?"

Her grandmother smiled. "The same thing a heartbeat does, child. It reminds you that you are here. That you are alive. That the same force that moves your blood has moved through every brave person who ever walked through a dark forest and came out the other side."

Maji kept the drum at her bedside. She never claimed to be unafraid. She simply kept drumming — quietly, steadily — until the fear became something she walked with rather than something that stopped her.`

      icon: "🦜",
      body: `Deep in the jungle was a place the animals called the Forest of Many Voices, and it was there that an argument had been going on for three seasons.

The argument was about who was most important.

The elephants said they were most important because they opened paths through the bush that every other animal used. The bees said they were most important because without their work, nothing would flower or fruit. The dung beetles said they were most important because without them, the whole savanna would be buried under what everyone else left behind.

Nobody could agree. The argument had grown so loud and so long that the animals had stopped speaking to one another entirely.

Maji heard about the argument from a weaver bird, who told her because weaver birds cannot keep a secret.

She went to the forest and sat in the middle of all the silence that the argument had created.

One by one, curious animals approached.

"Tell me what you do," Maji said to each of them.

She listened to the elephant, who described how her paths brought the whole savanna together. She listened to the bee, who showed Maji a honeycomb in an old termite mound — perfect hexagons, thousands of them, built over a summer. She listened to the dung beetle, who — she had to admit — made a very compelling case.

She listened to the weaver bird, who built nests so cleverly that not even the heaviest rains could reach the eggs inside. She listened to the acacia tree, who said nothing but spread its shade over everyone. She listened to the tiny ant, who said only, "I carry more than my own weight, every day."

When everyone had spoken, Maji was quiet for a long time.

"You are all describing the same thing," she said at last.

"We are nothing alike!" the elephant protested.

"You are all describing the same thing in different shapes," Maji clarified. "You are each describing: this is how I hold the world together."

A long silence followed.

It was the acacia tree that broke it — not with words, but by dropping a seed. The seed fell in the path the elephant had made, was moved by the dung beetle, planted by the ant, watered by the bee's flower-work, and sheltered in the weaver bird's discarded nest material.

The rains were late. The rivers were low. The leaves on the trees had turned from deep green to a tired, dusty grey-green, and the fruit bats flew further and further each night looking for food.

Maji sat outside her grandmother's house one evening and noticed something she had never noticed before: there were no fireflies.

Every year before this, the fireflies had come at dusk — small green-gold lights threading through the darkness, turning the night into something magical. She had grown up watching them. She had made promises to them as a small child: I will be brave. I will be kind. I will remember.

Now there were none.

"Where are the fireflies?" she asked her grandmother.

"Waiting," her grandmother said.

"For the rain?"

"For someone to keep looking."

Maji wasn't sure what that meant. But she began watching for them every evening anyway, just after sunset, in the narrow time between the last gold light and the first real dark.

A week passed. Two weeks.

On the fourteenth evening, when she had almost given up, she saw it — one small light. Blinking, uncertain, low to the ground near the dry creek bed. Then another. Then, slowly, as if one firefly had sent word to all the others, dozens more.

By the time her grandmother came outside, the whole edge of the forest was lit with them.

"They were here all along," Maji realised. "In the grass. Waiting."

"They wait for someone to notice them," her grandmother said quietly. "Most beautiful things do."

That night, lying under her blanket listening to the far sounds of the savanna, Maji understood something. Some things do not disappear when times are hard. They simply go quiet, conserving their light, waiting for the season to turn. Waiting for someone who will keep watching — even on the dark evenings when it seems like the light will never come back.

She remembered the promises she had made to the fireflies as a child.

  function generateFallbackCover(title, category = "Calm") {
    const canvas = document.createElement('canvas');
    canvas.width = 400;
    canvas.height = 500;
    const ctx = canvas.getContext('2d');
    const gradients = {
      Sleep: ["#0f2027", "#203a43", "#2c5364"],
      Calm: ["#1e3c72", "#2a5298"],
      Adventure: ["#42275a", "#734b6d"],
      Magic: ["#141E30", "#243B55"],
      Animals: ["#134E5E", "#71B280"]
    };
    const colors = gradients[category] || gradients.Calm;
    const grad = ctx.createLinearGradient(0, 0, 400, 500);
    grad.addColorStop(0, colors[0]);
    grad.addColorStop(1, colors[1]);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 400, 500);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px Quicksand";
    ctx.textAlign = "center";
    const words = title.split(" ");
    let line = "";
    let y = 200;
    words.forEach(word => {
      const testLine = line + word + " ";
      if (testLine.length > 18) {
        ctx.fillText(line, 200, y);
        line = word + " ";
        y += 30;
      } else {
        line = testLine;
      }
    });
    ctx.fillText(line, 200, y);
    return canvas.toDataURL();
  }

    const indexRef = React.useRef(0);
    const optionsRef = React.useRef({});
    const onSentenceRef = React.useRef(null);
    const onCompleteRef = React.useRef(null);
    const rateRef = React.useRef(1.0);
    const abortRef = React.useRef(false);
    const audioUrlsRef = React.useRef({}); // sentence-index → blob URL cache

    React.useEffect(() => {
      return () => {
        Object.values(audioUrlsRef.current).forEach(URL.revokeObjectURL);
        audioRef.current.pause();
      };
    }, []);

    const setRate = (r) => {
      rateRef.current = Math.max(0.7, Math.min(1.3, r));
      audioRef.current.playbackRate = rateRef.current;
    };

    const fetchSentenceAudio = async (sentence, storyId, voiceType) => {
      const cacheKey = `${storyId}_${voiceType}_${sentence.length}_${sentence.slice(0, 20)}`;
      if (audioUrlsRef.current[cacheKey]) return audioUrlsRef.current[cacheKey];

      const res = await fetch(NARRATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          storyId: `${storyId}_s${indexRef.current}`,
          voiceType,
          text: sentence,
        }),
      });

      if (!res.ok) throw new Error(`Narration fetch failed: ${res.status}`);
      const { url } = await res.json();
      audioUrlsRef.current[cacheKey] = url;
      return url;
    };

    const prefetchNext = (sentences, index, storyId, voiceType) => {
      const next = sentences[index + 1];
      if (!next) return;
      const key = `${storyId}_${voiceType}_${next.length}_${next.slice(0, 20)}`;
      if (!audioUrlsRef.current[key]) {
        fetchSentenceAudio(next, storyId, voiceType).catch(() => {});
      }
    };

    const playSentence = async (sentences, index, storyId, voiceType) => {
      if (abortRef.current || index >= sentences.length) {
        setIsPlaying(false);
        setCurrentSentenceIndex(index);
        if (onCompleteRef.current) onCompleteRef.current();
        return;
      }

      setCurrentSentenceIndex(index);
      indexRef.current = index;
      if (onSentenceRef.current) onSentenceRef.current(index);

      setIsLoading(true);
      try {
        const url = await fetchSentenceAudio(sentences[index], storyId, voiceType);
        if (abortRef.current) return;

        audioRef.current.src = url;
        audioRef.current.playbackRate = rateRef.current;

        setIsLoading(false);

        prefetchNext(sentences, index, storyId, voiceType);

        await audioRef.current.play();

        await new Promise((resolve, reject) => {
          audioRef.current.onended = resolve;
          audioRef.current.onerror = reject;
        });

        if (!abortRef.current && !isPaused) {
          await new Promise((r) => setTimeout(r, 320));
          playSentence(sentences, index + 1, storyId, voiceType);
        }
      } catch (err) {
        setIsLoading(false);
        setError(err.message);
        console.error("Playback error:", err);
        setIsPlaying(false);
      }
    };

    const speakSentences = async (
      sentences,
      options = { rate: 1.0, voiceType: "female", storyId: "unknown" },
      onSentenceChange,
      onComplete
    ) => {
      if (!sentences.length) return;

      abortRef.current = true;
      audioRef.current.pause();
      await new Promise((r) => setTimeout(r, 80));
      abortRef.current = false;

      sentencesRef.current = sentences;
      optionsRef.current = options;
      onSentenceRef.current = onSentenceChange;
      onCompleteRef.current = onComplete;
      rateRef.current = options.rate || 1.0;

      setIsPlaying(true);
      setIsPaused(false);
      setError(null);
      setCurrentSentenceIndex(0);

      playSentence(sentences, 0, options.storyId || "story", options.voiceType || "female");
    };

    const pause = () => {
      audioRef.current.pause();
      setIsPaused(true);
    };

    const resume = () => {
      audioRef.current.play();
      setIsPaused(false);
    };

    const stop = () => {
      abortRef.current = true;
      audioRef.current.pause();
      audioRef.current.src = "";
      setIsPlaying(false);
      setIsPaused(false);
      setIsLoading(false);
      setCurrentSentenceIndex(0);
      indexRef.current = 0;
    };

    return {
      voices: [],
      isPlaying,
      isPaused,
      isLoading,
      currentSentenceIndex,

      speakSentences,
      pause,
      resume,

            {isLoading ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a2e" strokeWidth="2.5" strokeLinecap="round"><circle cx="12" cy="12" r="9" strokeOpacity="0.25" /><path d="M12 3a9 9 0 019 9"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite" /></path></svg> : (isPlaying && !isPaused) ? <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><rect x="6" y="4" width="4" height="16" rx="1.5" /><rect x="14" y="4" width="4" height="16" rx="1.5" /></svg> : <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a1a2e"><polygon points="7,3 21,12 7,21" /></svg>}

  // ── StoryModal (uses new VoicePlayer) ──
  const StoryModal = ({ story, isOpen, onClose, onPlayVoice, voiceState, onSetTimer, userName, voiceType, setVoiceType, accent, setAccent, showMoral, setShowMoral, sleepTimerRemaining, calmMode, onComplete, onProgressUpdate, onBedtimeMode }) => {

    const handleSentenceChange = (idx) => { if (onProgressUpdate) onProgressUpdate(idx / sentences.length); };

  // ── ProfileTab (unchanged from original, but kept for completeness) ──
  const ProfileTab = ({ userProfile, favorites, progress, badges, isPremium, onUpgrade, onUpdateProfile, onLogout }) => {

="text-white/70 text-xs md:text-sm">Current Streak</span><span className="text-yellow-400 font-bold text-sm md:text-base">{progress.streak} days 🔥</span></div><div className="flex justify-between mb-2"><span className="text-white/70 text-xs md:text-sm">Total Stories Read</span><span className="text-yellow-400 font-bold text-sm md:text-base">{progress.totalStoriesRead}</span></div><div className="flex flex-wrap gap-2 mt-2">{badges.map(badge => (<div key={badge.id} className="bg-white/10 rounded-full px-2 py-1 text-xs flex items-center gap-1"><span>{badge.icon}</span> <span className="text-white/80">{badge.name}</span></div>))}{badges.length === 0 && <span className="text-white/40 text-xs">Complete stories to earn badges ✨</span>}</div></div><button onClick={onLogout} className="w-full py-2 bg-red-500/20 rounded-full text-red-300 text-sm md:text-base mt-2">Sign Out</button></div><div className="mt-4 text-center text-xs text-white/40">⭐ Maji Series · Season 1</div></div>);
  };

  const BackgroundSoundSelector = ({ activeSound, onSelectSound, volume, onVolumeChange, isPlaying }) => {
    const handleVolumeChange = (val) => { onVolumeChange(val); };
    return (<div className="bg-white/5 rounded-xl p-3 mx-4 md:mx-8 mb-6"><div className="text-yellow-300 text-xs md:text-sm font-semibold mb-2">🎵 Background Sounds</div><div className="flex gap-2 flex-wrap">{Object.keys(SOUNDS).map(sound => (<button key={sound} onClick={() => onSelectSound(sound)} className={`px-3 py-1 rounded-full text-xs md:text-sm capitalize transition ${activeSound === sound ? 'bg-yellow-400 text-indigo-950' : 'bg-white/10 text-white/80'}`}>{sound}</button>))}{activeSound && <button onClick={() => onSelectSound(null)} className="px-3 py-1 rounded-full text-xs bg-red-500/20 text-red-300">Stop</button>}</div><div className="mt-2 flex items-center gap-2"><span className="text-white/60 text-xs">Volume</span><input type="range" min="0" max="1" step="0.05" value={volume} onChange={(e) => handleVolumeChange(parseFloat(e.target.value))} className="flex-1 h-1 bg-white/20 rounded-full" /></div></div>);
  };

  const showStreakMessage = (streak) => { const div = document.createElement('div'); div.innerText = `🔥 ${streak} Day Streak! Keep going!`; div.className = "streak-toast"; document.body.appendChild(div); setTimeout(() => div.remove(), 2000); };

  // ----------------------------- MAIN APP -----------------------------
  const App = () => {
    const [user, setUser] = React.useState(null);
    const [userProfile, setUserProfile] = React.useState(null);
    const [loading, setLoading] = React.useState(true);
    const [activeTab, setActiveTab] = React.useState('home');
    const [sidebarOpen, setSidebarOpen] = React.useState(false);
    const [favorites, setFavorites] = React.useState(() => { const saved = localStorage.getItem('kulala_favorites'); return saved ? JSON.parse(saved) : []; });
    const [progress, setProgress] = React.useState(() => { const saved = localStorage.getItem('kulala_progress'); return saved ? JSON.parse(saved) : { streak: 0, lastReadDate: null, totalStoriesRead: 0, categoryReads: {}, nightReads: 0, storyProgress: {} }; });
    const [badges, setBadges] = React.useState(() => { const saved = localStorage.getItem('kulala_badges'); return saved ? JSON.parse(saved) : []; });
    const [isPremium, setIsPremium] = React.useState(false);
    const [selectedStory, setSelectedStory] = React.useState(null);
    const [modalOpen, setModalOpen] = React.useState(false);
    const [sleepModeActive, setSleepModeActive] = React.useState(false);
    const [sleepEndTime, setSleepEndTime] = React.useState(null);
    const [sleepTimerId, setSleepTimerId] = React.useState(null);
    const [sleepTimerRemaining, setSleepTimerRemaining] = React.useState(0);
    const [activeSound, setActiveSound] = React.useState(null);
    const [soundVolume, setSoundVolume] = React.useState(0.3);
    const [voiceType, setVoiceType] = React.useState("female");
    const [accent, setAccent] = React.useState("west");
    const [showMoral, setShowMoral] = React.useState(true);
    const [calmMode, setCalmMode] = React.useState(false);
    const [bedtimeMode, setBedtimeMode] = React.useState(false);
    const [bedtimeProgress, setBedtimeProgress] = React.useState(0);
    const [nowPlaying, setNowPlaying] = React.useState(null);
    const audioRef = React.useRef(null);
    const voice = useVoiceSynthesis();
    const [currentStoryProgress, setCurrentStoryProgress] = React.useState(0);

    // Bedtime ritual effect
    React.useEffect(() => {
      if (!bedtimeMode) return;
      let start = Date.now();
      const duration = 2 * 60 * 1000;
      const interval = setInterval(() => {
        const elapsed = Date.now() - start;
        const progressVal = Math.min(elapsed / duration, 1);
        setBedtimeProgress(progressVal);
        const dimmer = document.querySelector('.sleep-dimmer');
        if (dimmer) dimmer.style.opacity = 0.3 + progressVal * 0.5;
        if (audioRef.current) audioRef.current.volume = soundVolume * (1 - progressVal * 0.8);
        voice.setRate(0.85 - progressVal * 0.25);
        if (progressVal >= 1) {
          voice.stop();
          closeModal();
          setBedtimeMode(false);
          setBedtimeProgress(0);
          if (dimmer) dimmer.style.opacity = 0;
        }
      }, 1000);
      return () => clearInterval(interval);
    }, [bedtimeMode]);

    React.useEffect(() => {
      if (!sleepEndTime) return;
      const interval = setInterval(() => {
        const remaining = Math.max(0, Math.floor((sleepEndTime - Date.now()) / 60000));
        setSleepTimerRemaining(remaining);
        if (remaining <= 0) clearInterval(interval);
      }, 1000);
      return () => clearInterval(interval);
    }, [sleepEndTime]);

    React.useEffect(() => {
      if (calmMode) document.body.classList.add('calm-mode');
      else document.body.classList.remove('calm-mode');
    }, [calmMode]);

    React.useEffect(() => {
      if (audioRef.current) audioRef.current.volume = voice.isPlaying ? 0.1 : soundVolume;
    }, [voice.isPlaying, soundVolume]);

    // Auth listener
    React.useEffect(() => {
      const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
        if (firebaseUser) {
          setUser(firebaseUser);
          try {
            const doc = await db.collection("users").doc(firebaseUser.uid).get();
            if (doc.exists) {
              const data = doc.data();
              setUserProfile(data);
              setIsPremium(data.isPremium === true);
            } else {
              const fallback = { nickname: firebaseUser.email.split('@')[0], age: "4-6", avatar: "🌙", isPremium: false };
              await db.collection("users").doc(firebaseUser.uid).set(fallback);
              setUserProfile(fallback);
              setIsPremium(false);
            }
          } catch (err) { console.error(err); }
        } else { setUser(null); setUserProfile(null); setIsPremium(false); }
        setLoading(false);
      });
      return () => unsubscribe();
    }, []);

    React.useEffect(() => { localStorage.setItem('kulala_favorites', JSON.stringify(favorites)); }, [favorites]);
    React.useEffect(() => { localStorage.setItem('kulala_progress', JSON.stringify(progress)); }, [progress]);
    React.useEffect(() => { localStorage.setItem('kulala_badges', JSON.stringify(badges)); }, [badges]);

    React.useEffect(() => { if (activeSound && SOUNDS[activeSound]) { if (audioRef.current) audioRef.current.pause(); const audio = new Audio(SOUNDS[activeSound]); audio.loop = true; audio.volume = soundVolume; audio.play(); audioRef.current = audio; } else { if (audioRef.current) { audioRef.current.pause(); audioRef.current = null; } } return () => { if (audioRef.current) audioRef.current.pause(); }; }, [activeSound, soundVolume]);

    const updateStoryProgress = (story, percentage) => {
      const storyProgress = { ...progress.storyProgress, [story.id]: percentage };
      setProgress(prev => ({ ...prev, storyProgress }));
      setNowPlaying(prev => prev ? { ...prev, progress: percentage } : null);
      if (percentage >= 99) {
        canvasConfetti({ particleCount: 120, spread: 70, origin: { y: 0.6 } });
        setTimeout(() => alert("🌙 You're building a beautiful bedtime habit"), 1000);
        const today = new Date().toDateString();
        let newStreak = progress.streak;
        let streakIncreased = false;
        if (progress.lastReadDate !== today) {
          if (progress.lastReadDate === new Date(Date.now() - 86400000).toDateString()) {
            newStreak += 1;
            streakIncreased = true;
          } else {
            newStreak = 1;
            streakIncreased = true;
          }
        }
        const isNight = new Date().getHours() >= 20 || new Date().getHours() < 5;
        const newProgress = { ...progress, streak: newStreak, lastReadDate: today, totalStoriesRead: progress.totalStoriesRead + 1, categoryReads: { ...progress.categoryReads, [story.category]: (progress.categoryReads[story.category] || 0) + 1 }, nightReads: progress.nightReads + (isNight ? 1 : 0), storyProgress: { ...progress.storyProgress, [story.id]: 100 } };
        setProgress(newProgress);
        if (streakIncreased && newStreak > 1) showStreakMessage(newStreak);
        const newBadges = [...badges];
        BADGES.forEach(badge => { if (!newBadges.find(b => b.id === badge.id) && badge.condition(newProgress)) { newBadges.push({ id: badge.id, name: badge.name, icon: badge.icon, earnedAt: new Date().toISOString() }); } });
        if (newBadges.length !== badges.length) { setBadges(newBadges); setTimeout(() => alert(`🎉 New badge earned: ${newBadges[newBadges.length-1].name} ${newBadges[newBadges.length-1].icon}`), 500); }
      }
    };

    const toggleFavorite = (id) => { setFavorites(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]); };
    const openStory = (story) => {
      setSelectedStory(story);
      setModalOpen(true);
      const savedProgress = progress.storyProgress?.[story.id] || 0;
      setCurrentStoryProgress(savedProgress);
    };
    const closeModal = () => { voice.stop(); setModalOpen(false); setSelectedStory(null); if (sleepTimerId) clearTimeout(sleepTimerId); setSleepEndTime(null); setSleepTimerRemaining(0); setSleepModeActive(false); setBedtimeMode(false); setBedtimeProgress(0); setNowPlaying(null); const dimmer = document.querySelector('.sleep-dimmer'); if (dimmer) dimmer.style.opacity = 0; };
    const startVoiceForStory = (sentences, vType, acc, onSentenceChange, onComplete) => {
      const startIdx = Math.floor((currentStoryProgress / 100) * sentences.length);
      voice.speakSentences(
        sentences.slice(startIdx),
        {
          rate: 1.0,
          voiceType: vType,
          storyId: selectedStory.id,
          category: selectedStory.category,
        },
        (idx) => {
          const globalIdx = startIdx + idx;
          onSentenceChange(globalIdx);
          const newPercent = (globalIdx / sentences.length) * 100;
          updateStoryProgress(selectedStory, newPercent);
        },
        () => {
          updateStoryProgress(selectedStory, 100);
          if (onComplete) onComplete();
        }
      );
      setNowPlaying({
        id: selectedStory.id,
        title: selectedStory.title,
        icon: selectedStory.icon || "📖",
        progress: currentStoryProgress,
      });
    };
    const startSleepTimer = (minutes) => {
      if (sleepTimerId) clearTimeout(sleepTimerId);
      if (minutes > 0) {
        const end = Date.now() + minutes * 60000;
        setSleepEndTime(end);
        const timer = setTimeout(() => {
          voice.stop();
          setSleepModeActive(true);
          setSleepEndTime(null);
          setSleepTimerRemaining(0);
          setTimeout(() => closeModal(), 2000);
        }, minutes * 60000);
        setSleepTimerId(timer);
      } else if (sleepTimerId) { clearTimeout(sleepTimerId); setSleepTimerId(null); setSleepEndTime(null); setSleepTimerRemaining(0); }
    };
    const updateUserProfile = async (profileData) => { if (user) { await db.collection("users").doc(user.uid).update(profileData); setUserProfile({ ...userProfile, ...profileData }); } };
    const logout = async () => { await auth.signOut(); setUser(null); setUserProfile(null); setFavorites([]); setIsPremium(false); };
    const upgradeToPremium = () => { if (!user) { alert("Please log in to upgrade."); return; } alert("✨ Premium upgrade would unlock all stories + offline listening + ad-free experience. (Demo: Premium activated)"); setIsPremium(true); };
    const downloadOffline = () => { alert("📱 Offline download will be available in the mobile app. Coming soon!"); };
    window.autoplayEnabled = false;

    const newStories = ALL_STORIES.filter(s => s.isNew === true);
    const popularStories = ALL_STORIES.filter(s => s.category === "Sleep" || s.category === "Calm").slice(0, 8);
    const premiumStories = ALL_STORIES.filter(s => s.isPremium === true);
    const continueItems = CONTINUE_READING.map(item => ({ ...item, story: ALL_STORIES.find(s => s.id === item.id) })).filter(i => i.story);
    const featuredStory = ALL_STORIES.find(s => s.id === 1001) || ALL_STORIES[0];

    if (loading) return <div className="flex items-center justify-center h-screen text-white">Loading magical world...</div>;
    if (!user) return <AuthScreen onLogin={(firebaseUser, profile) => { setUser(firebaseUser); setUserProfile(profile); setIsPremium(profile.isPremium === true); }} />;

    return (
      <div className="relative min-h-screen bg-black">
        <div className={`sleep-dimmer ${sleepModeActive ? 'active' : ''}`} style={{ opacity: bedtimeProgress * 0.7 }} />
        <StarField />
        <div className="sidebar fixed top-0 left-0 h-full w-64 bg-black/90 backdrop-blur-xl border-r border-white/10 p-5 z-50 flex-col hidden md:flex">
          <h1 className="text-white text-2xl font-bold mb-8">🌙 Kulala</h1>
          {["home","library","favorites","profile"].map(tab => (
            <button key={tab} onClick={() => setActiveTab(tab)} className={`flex items-center gap-3 px-5 py-3 rounded-xl mb-2 text-left transition ${activeTab === tab ? "bg-yellow-400 text-black" : "text-white/80 hover:bg-white/10"}`}>
              <span className="text-xl">{tab === "home" ? "🏠" : tab === "library" ? "📚" : tab === "favorites" ? "❤️" : "👤"}</span>
              <span className="font-medium">{tab === "home" ? "Home" : tab === "library" ? "Library" : tab === "favorites" ? "Saved" : "Profile"}</span>
            </button>
          ))}
        </div>

        <Header isPremium={isPremium} onUpgrade={upgradeToPremium} calmMode={calmMode} setCalmMode={setCalmMode} />
        
        <div className="md:ml-64 pb-nav">
          {activeTab === 'home' && (
            <div>
              <HeroBanner story={featuredStory} onPlay={() => openStory(featuredStory)} />
              <BackgroundSoundSelector activeSound={activeSound} onSelectSound={setActiveSound} volume={soundVolume} onVolumeChange={setSoundVolume} isPlaying={voice.isPlaying} />
              <ContinueRow items={continueItems} stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
              <StoryRow title="✨ New Stories" stories={newStories} onOpen={openStory} isPremium={isPremium} />
              <StoryRow title="🌟 Popular Now" stories={popularStories} onOpen={openStory} isPremium={isPremium} />
              {!isPremium && premiumStories.length > 0 && <StoryRow title="⭐ Premium Picks" stories={premiumStories} onOpen={openStory} isPremium={isPremium} />}
              <StoryRow title="📚 All Stories" stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
              <div className="text-center my-4"><button onClick={downloadOffline} className="bg-white/10 text-white/80 px-4 py-2 rounded-full text-sm">📱 Download for offline (Premium)</button></div>
            </div>
          )}
          {activeTab === 'library' && (
            <div className="px-4 md:px-8 pt-4">
              <h2 className="text-white text-2xl font-bold mb-4">📚 Your Library</h2>
              <StoryRow title="All Stories" stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
            </div>
          )}
          {activeTab === 'favorites' && (
            <div className="px-4 md:px-8 pt-4">
              <h2 className="text-white text-2xl font-bold mb-4">❤️ Your Favorites</h2>
              {favorites.length === 0 ? (<div className="text-center py-12"><div className="text-5xl mb-3">❤️</div><p className="text-white/60">No favorites yet. Tap the heart on any story to save it here.</p></div>) : (<StoryRow title="Saved Stories" stories={ALL_STORIES.filter(s => favorites.includes(s.id))} onOpen={openStory} isPremium={isPremium} />)}
            </div>
          )}
          {activeTab === 'profile' && (
            <div className="px-4 md:px-8 pt-4 max-w-2xl mx-auto">
              <ProfileTab userProfile={userProfile} favorites={favorites} progress={progress} badges={badges} isPremium={isPremium} onUpgrade={upgradeToPremium} onUpdateProfile={updateUserProfile} onLogout={logout} />
            </div>
          )}
        </div>

        <BottomNav
          activeTab={activeTab}
          setActiveTab={setActiveTab}
          nowPlaying={nowPlaying}
          voiceState={voice}
          onPillTap={() => {
            const story = ALL_STORIES.find(s => s.id === nowPlaying?.id);
            if (story) openStory(story);
          }}
          onPlayPause={() => {
            if (voice.isPlaying && !voice.isPaused) voice.pause();
            else if (voice.isPaused) voice.resume();
          }}
          onCentrePress={() => {
            if (nowPlaying) {
              const story = ALL_STORIES.find(s => s.id === nowPlaying.id);
              if (story) openStory(story);
            } else {
              openStory(featuredStory);
            }
          }}
        />
        
        <StoryModal story={selectedStory} isOpen={modalOpen} onClose={closeModal} onPlayVoice={startVoiceForStory} voiceState={voice} onSetTimer={startSleepTimer} userName={userProfile?.nickname || "little one"} voiceType={voiceType} setVoiceType={setVoiceType} accent={accent} setAccent={setAccent} showMoral={showMoral} setShowMoral={setShowMoral} sleepTimerRemaining={sleepTimerRemaining} calmMode={calmMode} onComplete={() => { if (selectedStory) updateStoryProgress(selectedStory, 100); }} onProgressUpdate={(percent) => { if (selectedStory) updateStoryProgress(selectedStory, percent); }} onBedtimeMode={() => setBedtimeMode(true)} />
      </div>
    );
  };

  // StarField component (unchanged)
  const StarField = () => (<div className="fixed inset-0 pointer-events-none overflow-hidden">{[...Array(60)].map((_, i) => (<div key={i} className="star absolute bg-white rounded-full" style={{ width: Math.random() * 3 + 1 + 'px', height: Math.random() * 3 + 1 + 'px', left: Math.random() * 100 + '%', top: Math.random() * 100 + '%', animationDelay: Math.random() * 5 + 's' }} />))}</div>);

  ReactDOM.render(<App />, document.getElementById('root'));

  // Service Worker registration (optional)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('SW registered:', reg.scope);
      }).catch(err => console.error('SW failed:', err));
    });
  }
</script>
