  const CONTINUE_READING = [

    { id: 999, title: "Maji and the River Nyota", readTime: "6 min", author: "African Folktale", cover: ORIGINAL_MAJI.cover, progress: 45, isPremium: false, icon: "🐘" },

  const SOUNDS = { rain: "https://www.soundjay.com/nature/rain-sound-effect-2.mp3", forest: "https://www.soundjay.com/nature/forest-birds-sound-effect.mp3", ocean: "https://www.soundjay.com/nature/ocean-waves-sound-effect.mp3" };

  ];

  function generateFallbackCover(title, category = "Calm") {
    const canvas = document.createElement('canvas');
    canvas.width = 400;
    canvas.height = 500;
    const ctx = canvas.getContext('2d');
    const gradients = {
      Sleep: ["#0f2027", "#203a43", "#2c5364"],
      Calm: ["#1e3c72", "#2a5298"],
      Adventure: ["#42275a", "#734b6d"],
      Magic: ["#141E30", "#243B55"],
      Animals: ["#134E5E", "#71B280"]
    };
    const colors = gradients[category] || gradients.Calm;
    const grad = ctx.createLinearGradient(0, 0, 400, 500);
    grad.addColorStop(0, colors[0]);
    grad.addColorStop(1, colors[1]);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 400, 500);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px Quicksand";
    ctx.textAlign = "center";
    const words = title.split(" ");
    let line = "";
    let y = 200;
    words.forEach(word => {
      const testLine = line + word + " ";
      if (testLine.length > 18) {
        ctx.fillText(line, 200, y);
        line = word + " ";
        y += 30;
      } else {
        line = testLine;
      }
    });
    ctx.fillText(line, 200, y);
    return canvas.toDataURL();
  }

  // ---------- ENHANCED VOICE HOOK with dynamic rate & fixed overlap ----------
  const useVoiceSynthesis = () => {
    const [voices, setVoices] = React.useState([]);
    const [isPlaying, setIsPlaying] = React.useState(false);
    const [isPaused, setIsPaused] = React.useState(false);
    const [currentSentenceIndex, setCurrentSentenceIndex] = React.useState(0);
    const utteranceRef = React.useRef(null);
    const synth = window.speechSynthesis;
    const rateRef = React.useRef(0.85);

    React.useEffect(() => {
      const loadVoices = () => { setVoices(synth.getVoices()); };
      loadVoices();
      if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    }, []);

    const setRate = (newRate) => {
      rateRef.current = Math.max(0.5, Math.min(1.2, newRate));
    };

    const applyAccent = (text, accentType) => {
      if (accentType === "west") return text.replace(/\./g, "...").replace(/r/g, "rr").replace(/th/g, "d");
      if (accentType === "east") return text.replace(/th/g, "t").replace(/r/g, "l");
      if (accentType === "southern") return text.replace(/a/g, "ah").replace(/i/g, "ee");
      return text;
    };

    const speakSentences = async (sentences, options = { rate: 0.85, pitch: 1.0, voiceType: "female", accent: "west" }, onSentenceChange, onComplete) => {
      if (!sentences.length) return;
      if (utteranceRef.current) {
        synth.cancel();
        utteranceRef.current = null;
      }
      await new Promise(r => setTimeout(r, 50));

      let selectedVoice = voices[0];
      if (options.voiceType === "female") selectedVoice = voices.find(v => v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("samantha") || v.name.toLowerCase().includes("victoria")) || voices[0];
      else if (options.voiceType === "elder") selectedVoice = voices.find(v => v.name.toLowerCase().includes("english") || v.name.toLowerCase().includes("daniel") || v.name.toLowerCase().includes("alex")) || voices[0];
      else selectedVoice = voices.find(v => v.name.toLowerCase().includes("male") || v.name.toLowerCase().includes("google")) || voices[0];

      let index = 0;
      const speakNext = () => {
        if (index >= sentences.length) {
          setIsPlaying(false);
          setCurrentSentenceIndex(index);
          if (onComplete) onComplete();
          return;
        }
        setCurrentSentenceIndex(index);
        if (onSentenceChange) onSentenceChange(index);
        let sentence = applyAccent(sentences[index], options.accent);
        const utterance = new SpeechSynthesisUtterance(sentence);
        utterance.rate = rateRef.current;
        utterance.pitch = options.voiceType === "elder" ? 0.7 : options.pitch;
        utterance.voice = selectedVoice;
        utterance.onend = () => {
          index++;
          if (index < sentences.length && !isPaused) speakNext();
          else if (index >= sentences.length) {
            setIsPlaying(false);
            if (onComplete) onComplete();
          }
        };
        utterance.onerror = () => {
          setIsPlaying(false);
          if (onComplete) onComplete();
        };
        utteranceRef.current = utterance;
        synth.speak(utterance);
      };
      setIsPlaying(true);
      setIsPaused(false);
      speakNext();
    };

    const pause = () => { if (synth.speaking) { synth.pause(); setIsPaused(true); } };
    const resume = () => { if (synth.paused) { synth.resume(); setIsPaused(false); } };
    const stop = () => { synth.cancel(); setIsPlaying(false); setIsPaused(false); setCurrentSentenceIndex(0); utteranceRef.current = null; };
    return { voices, isPlaying, isPaused, currentSentenceIndex, speakSentences, pause, resume, stop, setRate };
  };

  // ---------- AUTH SCREEN ----------
  const AuthScreen = ({ onLogin }) => {

          if (doc.exists) onLogin(userCred.user, doc.data());
          else { const fallback = { nickname: email.split('@')[0], age: "4-6", avatar: "🌙" }; await db.collection("users").doc(userCred.user.uid).set(fallback); onLogin(userCred.user, fallback); }
        }
      } catch (err) { setError(err.message); } finally { setLoading(false); }
    };
    return (<div className="flex flex-col items-center justify-center min-h-screen p-4 bg-gradient-to-b from-indigo-950 to-black"><div className="w-full max-w-md bg-white/5 backdrop-blur-xl rounded-2xl p-6 border border-white/10"><h2 className="text-2xl font-bold text-white text-center mb-6">{isSignUp ? "Create Account" : "Welcome Back"}</h2><input className="w-full p-3 rounded-xl bg-black/30 border border-white/20 text-white mb-3" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} /><input className="w-full p-3 rounded-xl bg-black/30 border border-white/20 text-white mb-3" type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} />{isSignUp && (<><input className="w-full p-3 rounded-xl bg-black/30 border border-white/20 text-white mb-3" placeholder="Nickname" value={nickname} onChange={e => setNickname(e.target.value)} /><select className="w-full p-3 rounded-xl bg-black/30 border border-white/20 text-white mb-3" value={age} onChange={e => setAge(e.target.value)}><option value="2-4">Age 2–4</option><option value="4-6">Age 4–6</option><option value="6-8">Age 6–8</option><option value="8-10">Age 8–10</option></select><div className="flex gap-2 mb-3 flex-wrap">{avatars.map(av => (<button key={av} onClick={() => setAvatar(av)} className={`text-2xl p-2 rounded-full ${avatar === av ? 'bg-yellow-400/30 border border-yellow-400' : 'bg-white/10'}`}>{av}</button>))}</div></>)}<p className="text-red-400 text-sm mb-3">{error}</p><button onClick={handleAuth} disabled={loading} className="w-full py-3 bg-yellow-400 text-indigo-950 font-bold rounded-full hover:bg-yellow-500 transition">{loading ? "Please wait..." : (isSignUp ? "Sign Up" : "Login")}</button><p className="text-center text-white/60 mt-4">{isSignUp ? "Already have an account?" : "New to Kulala?"} <button onClick={() => setIsSignUp(!isSignUp)} className="text-yellow-400">{isSignUp ? "Login" : "Sign Up"}</button></p></div></div>);
  };

  // ---------- COMPONENTS ----------
  const StarField = () => (<div className="fixed inset-0 pointer-events-none overflow-hidden">{[...Array(60)].map((_, i) => (<div key={i} className="star absolute bg-white rounded-full" style={{ width: Math.random() * 3 + 1 + 'px', height: Math.random() * 3 + 1 + 'px', left: Math.random() * 100 + '%', top: Math.random() * 100 + '%', animationDelay: Math.random() * 5 + 's' }} />))}</div>);

  const HeroBanner = ({ story, onPlay }) => (<div className="relative h-[60vh] rounded-3xl overflow-hidden mb-8 mx-4 md:mx-8"><img src={story.cover} className="absolute inset-0 w-full h-full object-cover" onError={(e) => e.target.src = generateFallbackCover(story.title, story.category)} /><div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent" /><div className="absolute bottom-6 left-6 max-w-lg z-10"><h1 className="text-white text-3xl md:text-4xl font-bold story-title">{story.title}</h1><p className="text-white/80 mt-2 text-sm">{story.readTime} • {story.category}</p><div className="flex gap-3 mt-4"><button onClick={onPlay} className="px-6 py-2 bg-white text-black rounded-full font-semibold hover:bg-gray-200 transition thumb-button">▶ Play</button><button className="px-6 py-2 bg-white/20 text-white rounded-full hover:bg-white/30 transition">+ My List</button></div></div></div>);

Avatar(av)} className={`text-2xl p-2 rounded-full ${tempAvatar === av ? 'bg-yellow-400/30 border border-yellow-400' : 'bg-white/10'}`}>{av}</button>))}</div></div><button onClick={saveProfile} className="w-full py-2 bg-yellow-400/20 rounded-full text-yellow-300 text-sm md:text-base">Save Profile</button></div><div className="border-t border-white/10 pt-4"><h3 className="text-white font-semibold text-sm md:text-base mb-2">🏆 Achievements & Streaks</h3><div className="flex justify-between mb-2"><span className="text-white/70 text-xs md:text-sm">Current Streak</span><span className="text-yellow-400 font-bold text-sm md:text-base">{progress.streak} days 🔥</span></div><div className="flex justify-between mb-2"><span className="text-white/70 text-xs md:text-sm">Total Stories Read</span><span className="text-yellow-400 font-bold text-sm md:text-base">{progress.totalStoriesRead}</span></div><div className="flex flex-wrap gap-2 mt-2">{badges.map(badge => (<div key={badge.id} className="bg-white/10 rounded-full px-2 py-1 text-xs flex items-center gap-1"><span>{badge.icon}</span> <span className="text-white/80">{badge.name}</span></div>))}{badges.length === 0 && <span className="text-white/40 text-xs">Complete stories to earn badges ✨</span>}</div></div><button onClick={onLogout} className="w-full py-2 bg-red-500/20 rounded-full text-red-300 text-sm md:text-base mt-2">Sign Out</button></div><div className="mt-4 text-center text-xs text-white/40">⭐ Maji Series · Season 1</div></div>); };

    const popularStories = ALL_STORIES.filter(s => s.category === "Sleep" || s.category === "Calm").slice(0, 8);
    const premiumStories = ALL_STORIES.filter(s => s.isPremium === true);
    const continueItems = CONTINUE_READING.map(item => ({ ...item, story: ALL_STORIES.find(s => s.id === item.id) })).filter(i => i.story);
    const featuredStory = ALL_STORIES.find(s => s.id === 1001) || ALL_STORIES[0];

    if (loading) return <div className="flex items-center justify-center h-screen text-white">Loading magical world...</div>;
    if (!user) return <AuthScreen onLogin={(firebaseUser, profile) => { setUser(firebaseUser); setUserProfile(profile); }} />;

    return (
      <div className="relative min-h-screen bg-black">
        <div className={`sleep-dimmer ${sleepModeActive ? 'active' : ''}`} style={{ opacity: bedtimeProgress * 0.7 }} />
        <StarField />
        <Header userProfile={userProfile} isPremium={isPremium} onUpgrade={upgradeToPremium} onOpenProfile={() => setActiveTab('profile')} calmMode={calmMode} setCalmMode={setCalmMode} />
        
        {activeTab === 'home' && (
          <div className="pb-28">
            <HeroBanner story={featuredStory} onPlay={() => openStory(featuredStory)} />
            <BackgroundSoundSelector activeSound={activeSound} onSelectSound={setActiveSound} volume={soundVolume} onVolumeChange={setSoundVolume} isPlaying={voice.isPlaying} />
            <ContinueRow items={continueItems} stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
            <StoryRow title="✨ New Stories" stories={newStories} onOpen={openStory} isPremium={isPremium} />
            <StoryRow title="🌟 Popular Now" stories={popularStories} onOpen={openStory} isPremium={isPremium} />
            {!isPremium && premiumStories.length > 0 && <StoryRow title="⭐ Premium Picks" stories={premiumStories} onOpen={openStory} isPremium={isPremium} />}
            <StoryRow title="📚 All Stories" stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
            <div className="text-center my-4"><button onClick={downloadOffline} className="bg-white/10 text-white/80 px-4 py-2 rounded-full text-sm">📱 Download for offline (Premium)</button></div>
          </div>
        )}
        {activeTab === 'library' && (
          <div className="px-4 md:px-8 pb-28 pt-4">
            <h2 className="text-white text-2xl font-bold mb-4">📚 Your Library</h2>
            <StoryRow title="All Stories" stories={ALL_STORIES} onOpen={openStory} isPremium={isPremium} />
          </div>
        )}
        {activeTab === 'favorites' && (
          <div className="px-4 md:px-8 pb-28 pt-4">
            <h2 className="text-white text-2xl font-bold mb-4">❤️ Your Favorites</h2>
            {favorites.length === 0 ? (<div className="text-center py-12"><div className="text-5xl mb-3">❤️</div><p className="text-white/60">No favorites yet. Tap the heart on any story to save it here.</p></div>) : (<StoryRow title="Saved Stories" stories={ALL_STORIES.filter(s => favorites.includes(s.id))} onOpen={openStory} isPremium={isPremium} />)}
          </div>
        )}
        {activeTab === 'profile' && (
          <div className="px-4 md:px-8 pb-28 pt-4 max-w-2xl mx-auto">
            <ProfileTab userProfile={userProfile} favorites={favorites} progress={progress} badges={badges} isPremium={isPremium} onUpgrade={upgradeToPremium} onUpdateProfile={updateUserProfile} onLogout={logout} />
          </div>
        )}
        
        <button onClick={() => setActiveTab('home')} className="play-btn fixed bottom-20 left-1/2 -translate-x-1/2 z-40 w-14 h-14 rounded-full bg-gradient-to-r from-yellow-400 to-amber-500 text-indigo-950 text-xl shadow-xl flex items-center justify-center hover:scale-110 active:scale-95 transition thumb-button">▶</button>
        
        <div className="fixed bottom-4 left-0 right-0 flex justify-center z-50">
          <div className="relative flex items-center gap-2 px-4 py-3 rounded-2xl bg-white/10 backdrop-blur-3xl border border-white/20 shadow-[0_10px_40px_rgba(0,0,0,0.6)]">
            {[
              { name: "home", icon: "home", label: "Home" },
              { name: "library", icon: "book-open", label: "Library" },
              { name: "favorites", icon: "heart", label: "Saved" },
              { name: "profile", icon: "user", label: "Profile" }
            ].map(tab => {
              const isActive = activeTab === tab.name;
              return (<button key={tab.name} onClick={() => setActiveTab(tab.name)} className="dock-button relative flex flex-col items-center justify-center w-14 py-1 rounded-xl transition-all duration-300 group">{isActive && <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-yellow-400/20 blur-md -z-0" />}<span className={`z-10 transition-all duration-300 ${isActive ? "text-yellow-400 scale-110" : "text-white/60 group-hover:text-white/80"}`}><i data-lucide={tab.icon} className="w-5 h-5"></i></span><span className={`text-[10px] mt-1 transition-all duration-200 ${isActive ? "opacity-100 text-yellow-400" : "opacity-0 group-hover:opacity-100 text-white/60"}`}>{tab.label}</span></button>);
            })}
          </div>
        </div>
        
        <StoryModal story={selectedStory} isOpen={modalOpen} onClose={closeModal} onPlayVoice={startVoiceForStory} voiceState={voice} onSetTimer={startSleepTimer} userName={userProfile?.nickname || "little one"} voiceType={voiceType} setVoiceType={setVoiceType} accent={accent} setAccent={setAccent} showMoral={showMoral} setShowMoral={setShowMoral} sleepTimerRemaining={sleepTimerRemaining} calmMode={calmMode} onComplete={() => { if (selectedStory) updateStoryProgress(selectedStory, 100); }} onProgressUpdate={(percent) => { if (selectedStory) updateStoryProgress(selectedStory, percent); }} onBedtimeMode={() => setBedtimeMode(true)} />
      </div>
    );
  };

  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
